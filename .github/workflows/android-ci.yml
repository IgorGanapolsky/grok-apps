name: Android CI/CD Regression Prevention

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/Agent-Bill/gradlew

      - name: Run JVM Unit Tests
        run: |
          cd android/Agent-Bill
          ./gradlew testDebugUnitTest

      - name: Generate Code Coverage Report
        run: |
          cd android/Agent-Bill
          ./gradlew jacocoTestReport

      - name: Verify Code Coverage Exists
        run: |
          ls -lh android/Agent-Bill/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          ls -lh android/Agent-Bill/app/build/reports/jacoco/jacocoTestReport/html/index.html

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm-rules.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger

      - name: Run Instrumented E2E UI Tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android/Agent-Bill
          script: ./gradlew connectedDebugAndroidTest
